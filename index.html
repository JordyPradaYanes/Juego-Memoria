<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <section class="game-section">
            <h1>Juego de Memoria</h1>
            <div id="board" class="board">
                <!-- El tablero se genera dinámicamente con JavaScript -->
            </div>
            <button id="reset-btn" class="reset-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reiniciar Juego
            </button>
        </section>
        
        <section class="stats-section">
            <div class="stat-box">
                <span class="stat-label">Aciertos</span>
                <span id="aciertos" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Tiempo</span>
                <span id="t-restante" class="stat-value">30s</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Movimientos</span>
                <span id="movimientos" class="stat-value">0</span>
            </div>
        </section>
    </main>
    <footer>
        <p>Juego Programado por 👉 <a href="#">Jordy Prada</a></p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
